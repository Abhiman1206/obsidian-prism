services:
  - type: web
    name: loan-agents-backend
    runtime: python
    plan: starter
    rootDir: .
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: python -m uvicorn loan_agents.runtime.asgi:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src/src
      - key: RUNTIME_DOTENV
        value: "0"
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gemini-3-flash-preview
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_RETRIES
        value: "5"
      - key: BACKOFF_MULTIPLIER
        value: "2.0"
      - key: BACKOFF_MIN_SECONDS
        value: "4.0"
      - key: BACKOFF_MAX_SECONDS
        value: "30.0"
      - key: REQUESTS_PER_MINUTE
        value: "15"
      - key: RUN_TIMEOUT_SECONDS
        value: "10.0"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CORS_ALLOW_CREDENTIALS
        value: "false"